site_name: IU Alumni Docs
site_description: Technical documentation for the IU Alumni platform
site_url: https://iu-alumni.github.io/docs/
docs_dir: src
theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Technical Documentation:
    - System Overview: technical/overview.md
    - Backend: technical/backend.md
    - Frontend (Admin Portal): technical/frontend.md
    - Mobile App: technical/mobile.md
    - Infrastructure: technical/infrastructure.md
  - Requirements:
    - Functional Requirements: requirements/functional.md
    - Quality Attributes: requirements/quality-attributes.md
    - Use Cases & User Stories: requirements/use-cases.md
  - Metrics & Analytics:
    - Metrics & Analytics: analytics/metrics.md
  - Sprints:
    - Sprint 0:
      - Client Meeting 1: sprints/sprint-0/client-meeting-1.md
      - Mentor Meeting 1: sprints/sprint-0/mentor-meeting-1.md
      - Retrospective: sprints/sprint-0/retrospective.md
      - Team Meeting 1: sprints/sprint-0/team-meeting-1.md
    - Sprint 1:
      - Client Meeting 1: sprints/sprint-1/client-meeting-1.md
      - Mentor Meeting 1: sprints/sprint-1/mentor-meeting-1.md
    - Sprint 2:
      - Client Meeting 1: sprints/sprint-2/client-meeting-1.md
      - Mentor Meeting 1: sprints/sprint-2/mentor-meeting-1.md
      - Team Meeting 1: sprints/sprint-2/team-meeting-1.md
